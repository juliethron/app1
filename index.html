<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nekko ₍⸍⸌̣ʷ̣̫⸍̣⸌₎</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>

<body>

  <header class="hero">
    <h1>Nekko ₍⸍⸌̣ʷ̣̫⸍̣⸌₎</h1>
    <img class="hero-gif" src="./assets/cat.webp" alt="Cute cat">
  </header>

  <div class="form-switch">
    <button type="button" id="show-login">Login</button>
    <button type="button" id="show-register">Register</button>
  </div>

  <section id="register-section">
    <h2>Create account</h2>

    <form id="register-form">
      <input id="register-name" type="text" placeholder="Name" required>
      <input id="register-email" type="email" placeholder="Email" required>
      <input id="register-password" type="password" placeholder="Password" required>

      <button type="submit">Register</button>
    </form>

    <p id="register-message"></p>
  </section>

  <section id="auth-section">
    <h2>Login</h2>

    <form id="login-form">
      <input id="email" type="email" placeholder="Email" required>
      <input id="password" type="password" placeholder="Password" required>

      <button type="submit">Login</button>
    </form>

    <p id="login-message"></p>
  </section>

  <section id="posts-section" style="display: none;">
    <h2>All Posts</h2>

    <div id="create-post">
      <input id="post-title" type="text" placeholder="Post title">
      <textarea id="post-body" placeholder="Write something..."></textarea>
      <button id="createBtn" type="button">Create Post</button>
    </div>

    <div id="posts"></div>
  </section>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
